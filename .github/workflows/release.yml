name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            targets: "packageDeb packageReleaseUnsignedBundle wasmJsBrowserDistribution jsBrowserDistribution"
          - os: macos-latest
            targets: "packageDmg"
          - os: windows-latest
            targets: "packageMsi"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew ${{ matrix.targets }}

      - name: Collect Linux artifacts
        if: runner.os == 'Linux'
        run: |
          mkdir -p release-artifacts
          cp composeApp/build/compose/binaries/main/deb/*.deb release-artifacts/ || true
          cp composeApp/build/outputs/bundle/release/*.aab release-artifacts/ || true
          cd composeApp/build/dist/wasmJs/productionExecutable && zip -r ../../../../../release-artifacts/web-wasm.zip . && cd -

      - name: Collect macOS artifacts
        if: runner.os == 'macOS'
        run: |
          mkdir -p release-artifacts
          cp composeApp/build/compose/binaries/main/dmg/*.dmg release-artifacts/ || true

      - name: Collect Windows artifacts
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp composeApp/build/compose/binaries/main/msi/*.msi release-artifacts/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          path: release-artifacts/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
